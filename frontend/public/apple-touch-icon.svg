<svg width="180" height="180" viewBox="0 0 180 180" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Apple Touch Icon - Optimized for iOS -->
  <rect width="180" height="180" rx="40" fill="#8B1A1A"/>
  
  <!-- Wax Seal Effect -->
  <circle cx="90" cy="90" r="75" fill="#A52A2A" opacity="0.3"/>
  <circle cx="90" cy="90" r="65" stroke="#F5F2E9" stroke-width="2" fill="none" opacity="0.4"/>
  
  <!-- Book/Archive Symbol -->
  <g transform="translate(90, 90)">
    <!-- Book -->
    <rect x="-30" y="-40" width="60" height="80" rx="4" fill="#F5F2E9"/>
    <rect x="-27" y="-37" width="54" height="74" rx="3" fill="#FCFAF2"/>
    <rect x="-24" y="-34" width="48" height="68" rx="2" fill="#F5F2E9"/>
    
    <!-- Decorative Lines -->
    <line x1="-18" y1="-20" x2="18" y2="-20" stroke="#D4AF37" stroke-width="2" stroke-linecap="round"/>
    <line x1="-18" y1="-10" x2="18" y2="-10" stroke="#D4AF37" stroke-width="2" stroke-linecap="round"/>
    <line x1="-18" y1="0" x2="18" y2="0" stroke="#D4AF37" stroke-width="2" stroke-linecap="round"/>
    
    <!-- "R" Monogram for Remembrance -->
    <text x="0" y="25" font-family="serif" font-size="40" font-weight="bold" fill="#8B1A1A" text-anchor="middle" dominant-baseline="middle">R</text>
    
    <!-- Network Nodes -->
    <circle cx="-35" cy="-50" r="4" fill="#D4AF37" opacity="0.7"/>
    <circle cx="35" cy="-50" r="4" fill="#D4AF37" opacity="0.7"/>
    <circle cx="-35" cy="50" r="4" fill="#D4AF37" opacity="0.7"/>
    <circle cx="35" cy="50" r="4" fill="#D4AF37" opacity="0.7"/>
  </g>
</svg>
